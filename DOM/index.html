<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Practice</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
        <section id="first-section">
            <p id="btn-title">Hello, I am html</p>
            <button id="text-btn">changeText</button>
        </section>

        <!--first section ends and second section starts here  -->

        <section id="second-section">
            <p>Number will increase one by one per click of button.</p>
            <h2 id="count">0</h2>
            <button id="num-btn">Click Me</button>

        </section>

        <!-- second section ends and third starts here -->

        <section id="third-section">
            <div id="text-parent">
                <p id="hidden-text">Lorem ipsum, dolor sit amet consectetur adipisicing elit. Totam, quibusdam aspernatur. Earum accusamus atque debitis laborum sapiente maxime ex quo?</p>
            </div>
            <button id="hide-btn">Hide Text</button>
        </section>

        <!-- third section ends here and fourth starts here -->

        <section id="fourth-section">
            <div id="text-show"></div>
            <input type="text" placeholder="Type your message here... " name="" id="text-input">
        </section>





    <script src="JS/first.js"></script>
    <script src="JS/second.js"></script>
    <script src="JS/third.js"></script>
    
</body>
</html>
